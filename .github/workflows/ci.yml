name: AI Daily TODO Reminder

on:
  schedule:
    - cron: "30 3 * * *" # Runs daily at 9:00 AM IST (0:30 AM UTC)
    - cron: "30 11 * * *"   # Runs daily at 5:00 PM IST (3:30 PM UTC)
  workflow_dispatch:       # Allows manual trigger

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build